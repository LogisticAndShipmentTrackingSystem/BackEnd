spring.application.name=LogisticsAndShipmentsBackend

#DB config
spring.datasource.url=jdbc:mysql://localhost:3306/logistics_shipment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
